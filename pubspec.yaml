name: aitmatov_app
description: Aitmatov Digital — EdTech платформа для школьников и учителей
publish_to: 'none'
version: 1.6.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.1

  # Network
  dio: ^5.4.0
  dio_cache_interceptor: ^3.5.0
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.2
  webview_flutter: ^4.8.0
  audioplayers: ^6.0.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # UI / UX
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # DI
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Functional Programming
  dartz: ^0.10.1

  # Utils
  intl: ^0.20.2
  logger: ^2.0.2
  chucker_flutter: ^1.9.2

  # Icons
  cupertino_icons: ^1.0.6
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"